<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LookCraft | Servidor Minecraft</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle, #22b1c4 0%, #104e57 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Press Start 2P', cursive;
            color: white;
            margin: 0;
        }
        .container {
            background: rgba(10, 10, 20, 0.8);
            padding: 40px;
            border: 4px solid #8e44ad; /* Borde morado */
            outline: 4px solid #22b1c4; /* Borde cian */
            text-align: center;
            box-shadow: 0 0 30px rgba(34, 177, 196, 0.4);
        }
        .ip-box {
            border: 2px solid #22b1c4;
            padding: 15px;
            margin: 20px 0;
            background: rgba(34, 177, 196, 0.1);
            color: #00ffff;
            font-size: 1.2rem;
        }
        h1 { font-size: 2.5rem; text-shadow: 3px 3px #000; margin-bottom: 10px; }
        .info { font-size: 0.8rem; line-height: 2; }
    </style>
</head>
<body>
    <div class="container">
        <h1>LOOK CRAFT</h1>
        <p>¡Únete a la mejor aventura!</p>
        
        <div class="ip-box">
            mc.lookcraft.net
        </div>

        <div class="info">
            Versión: 1.20.1 <br>
            Estado: 24/7
        </div>
    </div>
</body>
</html>
