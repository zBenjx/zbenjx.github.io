<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polo Craft | Servidor Minecraft</title>
    
    <link rel="icon" type="image/png" href="favicon.png">

    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; }
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Press Start 2P', cursive;
            color: white;
            text-align: center;
        }

        /* --- IMAGEN DE FONDO (BACKGROUND) --- */
        body {
            background-image: url('background.jpg');
            background-size: cover; /* Cubre toda la pantalla */
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- CONTENEDOR CENTRAL --- */
        .page-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* --- LOGO PRINCIPAL --- */
        .logo-container img {
            max-width: 400px; /* Ajusta el tamaño de tu logo aquí */
            width: 100%;
            height: auto;
            margin-bottom: 20px;
        }

        /* --- LA CAJA DEL SERVIDOR (Estilo Neón) --- */
        .container {
            background: rgba(10, 10, 20, 0.85); /* Fondo oscuro transparente */
            padding: 40px;
            border: 4px solid #8e44ad; /* Borde morado */
            outline: 4px solid #22b1c4; /* Borde cian */
            max-width: 600px;
            width: 100%;
            box-shadow: 0 0 30px rgba(34, 177, 196, 0.4);
        }

        /* --- ESTILOS DE TEXTO --- */
        .slogan { font-size: 0.9rem; line-height: 1.6; margin-bottom: 25px; }
        
        .ip-label { font-size: 0.7rem; color: #aaa; margin-bottom: 5px; }
        
        .ip-box {
            border: 2px solid #22b1c4;
            padding: 15px;
            margin-bottom: 25px;
            background: rgba(34, 177, 196, 0.15);
            color: #00ffff;
            font-size: 1.1rem;
            text-shadow: 0 0 5px #00ffff;
        }

        .server-stats {
            display: flex;
            justify-content: space-around;
            font-size: 0.75rem;
            color: #ccc;
            line-height: 1.8;
        }
        
        /* Ajuste para móviles */
        @media (max-width: 600px) {
            .container { padding: 25px 15px; }
            .logo-container img { max-width: 280px; }
            .ip-box { font-size: 0.9rem; }
            .server-stats { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>

    <div class="page-wrap">
        
        <div class="logo-container">
            <img src="logo_principal.png" alt="Polo Craft Logo">
        </div>

        <div class="container">
            <p class="slogan">¡Únete a la mejor aventura de Minecraft!</p>
            
            <div class="ip-label">IP DEL SERVIDOR</div>
            <div class="ip-box">
                mc.polocraft.net
            </div>

            <div class="server-stats">
                <div>Versión: 1.20.1</div>
                <div>Estado: 24/7</div>
            </div>
        </div>

    </div>

</body>
</html>
