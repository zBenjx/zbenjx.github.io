<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LookCraft | Servidor Minecraft</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; }
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Press Start 2P', cursive;
            color: white;
            text-align: center;
        }

        /* --- FONDO DEL SITIO --- */
        body {
            background-color: #0f0f1a; 
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- CONTENEDOR PRINCIPAL PARA ALINEAR TODO --- */
        .page-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* --- ANIMACIÓN PARA EL LOGO FLOTANTE --- */
        @keyframes flotarLogo {
            0% {
                transform: translateY(0px);
                filter: drop-shadow(0px 5px 5px rgba(0,0,0,0.5));
            }
            50% {
                transform: translateY(-15px); /* Sube 15px */
                filter: drop-shadow(0px 20px 10px rgba(0,0,0,0.3)); 
            }
            100% {
                transform: translateY(0px);
                filter: drop-shadow(0px 5px 5px rgba(0,0,0,0.5));
            }
        }

        /* --- ESTILOS DEL LOGO --- */
        .logo-container img {
            max-width: 250px; /* Tamaño ajustado */
            width: 100%;
            height: auto;
            margin-bottom: 15px;
            /* Aplicamos la animación de flotar aquí */
            animation: flotarLogo 3s ease-in-out infinite;
        }

        /* --- CAJA CENTRAL (ESTILO NEÓN) --- */
        .container {
            background: rgba(10, 10, 20, 0.85);
            padding: 40px;
            border: 4px solid #8e44ad;
            outline: 4px solid #22b1c4;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 0 30px rgba(34, 177, 196, 0.4);
        }

        /* --- TEXTOS --- */
        .slogan { font-size: 0.9rem; line-height: 1.6; margin-bottom: 25px; }
        .ip-label { font-size: 0.7rem; color: #aaa; margin-bottom: 5px; }
        
        /* --- CAJA DE LA IP INTERACTIVA --- */
        .ip-box {
            border: 2px solid #22b1c4;
            padding: 15px;
            margin-bottom: 25px;
            background: rgba(34, 177, 196, 0.15);
            color: #00ffff;
            font-size: 1.1rem;
            text-shadow: 0 0 5px #00ffff;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .ip-box:hover {
            background: rgba(34, 177, 196, 0.3);
            transform: scale(1.02);
        }

        #mensaje-copiado {
            display: none;
            font-size: 0.6rem;
            color: #fff;
            margin-top: 10px;
            text-shadow: none;
        }

        /* --- ESTADÍSTICAS DEL SERVIDOR --- */
        .server-stats {
            display: flex;
            justify-content: space-around;
            font-size: 0.75rem;
            color: #ccc;
            line-height: 1.8;
        }
        
        /* --- ADAPTACIÓN PARA CELULARES --- */
        @media (max-width: 600px) {
            .container { padding: 25px 15px; }
            .logo-container img { max-width: 200px; }
            .ip-box { font-size: 0.9rem; }
            .server-stats { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>

    <div class="page-wrap">
        
        <div class="logo-container">
            <img src="logo_principal.png" alt="Logo de LookCraft">
        </div>

        <div class="container">
            <p class="slogan">¡Únete al mejor survival custom!</p>
            
            <div class="ip-label">IP DEL SERVIDOR (Clic para copiar)</div>
            
            <div class="ip-box" onclick="copiarIP()">
                <span id="ip-texto">mc.lookcraft.net</span>
                <div id="mensaje-copiado">¡Ip copiada con exito!</div>
            </div>

            <div class="server-stats">
                <div>Versión: 1.21.11</div>
                <div id="contador-jugadores">Cargando jugadores...</div>
            </div>
        </div>

    </div>

    <script>
        // Función para copiar la IP al portapapeles
        function copiarIP() {
            const ip = document.getElementById("ip-texto").innerText;
            navigator.clipboard.writeText(ip).then(() => {
                const mensaje = document.getElementById("mensaje-copiado");
                mensaje.style.display = "block"; 
                setTimeout(() => {
                    mensaje.style.display = "none";
                }, 2000);
            }).catch(err => {
                console.error('Error al copiar: ', err);
            });
        }

        // Función para consultar la API de Minecraft
        const ipDelServidor = "play.lookcraft.net"; 
        
        fetch('https://api.mcsrvstat.us/3/' + ipDelServidor)
            .then(response => response.json())
            .then(data => {
                const contadorElemento = document.getElementById('contador-jugadores');
                
                if (data.online) {
                    contadorElemento.innerText = "Jugadores: " + data.players.online + "/" + data.players.max;
                    contadorElemento.style.color = "#55ff55"; // Verde
                } else {
                    contadorElemento.innerText = "Estado: Apagado";
                    contadorElemento.style.color = "#ff5555"; // Rojo
                }
            })
            .catch(error => {
                console.error("Error al cargar la API:", error);
                document.getElementById('contador-jugadores').innerText = "Error cargando estado";
            });
    </script>

</body>
</html>
